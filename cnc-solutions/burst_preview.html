<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>CNC Easter Burst — 9 Screens Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 12px;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    color: #888;
  }
  h1 { font-size: 13px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 6px; color: #666; }
  .info { font-size: 11px; margin-bottom: 12px; opacity: 0.5; }
  .wall {
    display: flex;
    gap: 3px;
    width: 100vw;
    padding: 0 8px;
  }
  .wall img {
    flex: 1;
    min-width: 0;
    width: calc((100vw - 40px) / 9);
    height: auto;
    display: block;
    border: 1px solid #222;
    border-radius: 2px;
    object-fit: contain;
  }
  .labels {
    display: flex;
    width: 100vw;
    padding: 0 8px;
    gap: 3px;
    margin-top: 4px;
  }
  .labels span {
    flex: 1;
    text-align: center;
    font-size: 10px;
    opacity: 0.4;
  }
</style>
</head>
<body>
  <h1>Easter Burst Preview</h1>
  <p class="info">9 screens · 2160×3840 each</p>
  <div class="wall">
    <img src="output/burst_screen_1.png" alt="Screen 1">
    <img src="output/burst_screen_2.png" alt="Screen 2">
    <img src="output/burst_screen_3.png" alt="Screen 3">
    <img src="output/burst_screen_4.png" alt="Screen 4">
    <img src="output/burst_screen_5.png" alt="Screen 5">
    <img src="output/burst_screen_6.png" alt="Screen 6">
    <img src="output/burst_screen_7.png" alt="Screen 7">
    <img src="output/burst_screen_8.png" alt="Screen 8">
    <img src="output/burst_screen_9.png" alt="Screen 9">
  </div>
  <div class="labels">
    <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span>
  </div>
</body>
</html>
